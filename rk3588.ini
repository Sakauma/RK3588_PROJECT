# RK3588 PCIe 测试配置文件
# 上行 DMA 通道号（默认 5）
UP_LOOP_DMA_CHANNUM=5

# 下行 DMA 通道号（默认 4）
DOWN_LOOP_DMA_CHANNUM=4

# YUV 文件保存路径（默认 /tmp/pcie_yuv/）
YUV_SAVE_PATH=/tmp/pcie_yuv/

# 是否打印详细信息（1=启用，0=禁用，默认 1）
PRINTF_UP_MAG=0

# 视频编码配置
# FPGA 预处理后图像尺寸；必须与 FPGA 输出一致
FRAME_WIDTH=1920
FRAME_HEIGHT=1080

# 编码器：h265 或 h264
VIDEO_CODEC=h265
FRAME_FPS=30
VIDEO_BITRATE=8000000
VIDEO_OUTPUT_PATH=/tmp/rk3588_capture.h265

INPUT_PIXEL_FORMAT=gray10le16
PREFER_MAIN10=0

# FPGA 当前通过 PCIe 输出 gray10le16：16bit little-endian 容器，低 10bit 有效。
# RK3588 只把该灰度帧准备成 MPP 接收的 8-bit NV12，不再做 OSD 或原始位深转换。
RAW16_MAP_MODE=window
RAW16_SHIFT=2
RAW16_BLACK_LEVEL=0
RAW16_WHITE_LEVEL=1023
RAW16_AUTO_LOW_CLIP_PERMILLE=5
RAW16_AUTO_HIGH_CLIP_PERMILLE=5
RAW16_LITTLE_ENDIAN=1

# 若 payload 内部还包含 CVG_GLKIMG_DMAHD 图像切片头，置 1
INPUT_HAS_IMG_DMA_HEADER=0

# OSD 已由 FPGA 烧录进像素，RK3588 默认不绘制软件 OSD。
OSD_MODE=burned-in
OSD_ENABLE=0
OSD_TEST_ENABLE=0

# 编码线程队列深度；满时丢弃最旧帧以降低延迟
ENCODER_QUEUE_DEPTH=3
