# RK3588 PCIe 测试配置文件
# 上行 DMA 通道号（默认 5）
UP_LOOP_DMA_CHANNUM=5

# 下行 DMA 通道号（默认 4）
DOWN_LOOP_DMA_CHANNUM=4

# YUV 文件保存路径（默认 /tmp/pcie_yuv/）
YUV_SAVE_PATH=/tmp/pcie_yuv/

# 是否打印详细信息（1=启用，0=禁用，默认 1）
PRINTF_UP_MAG=0

# 视频编码配置
# RAW16 灰度输入尺寸；必须与上游图像流一致
FRAME_WIDTH=1920
FRAME_HEIGHT=1080

# 编码器：h265 或 h264
VIDEO_CODEC=h265
FRAME_FPS=30
VIDEO_BITRATE=8000000
VIDEO_OUTPUT_PATH=/tmp/rk3588_capture.h265

INPUT_PIXEL_FORMAT=gray10le16
PREFER_MAIN10=1

# RAW16 转 8-bit Y 平面的灰度映射。
# shift: 直接右移，最快；window: 固定黑白电平窗口；auto_window: 按帧自动拉伸并裁掉少量离群点。
RAW16_MAP_MODE=shift
RAW16_SHIFT=2
RAW16_BLACK_LEVEL=0
RAW16_WHITE_LEVEL=1023
RAW16_AUTO_LOW_CLIP_PERMILLE=5
RAW16_AUTO_HIGH_CLIP_PERMILLE=5
RAW16_LITTLE_ENDIAN=1

# 若 payload 内部还包含 CVG_GLKIMG_DMAHD 图像切片头，置 1
INPUT_HAS_IMG_DMA_HEADER=0

# OSD：auto 表示保留已烧录 OSD；有外部元数据时在编码前叠加
OSD_MODE=auto
OSD_ENABLE=1
OSD_TEST_ENABLE=0

# 编码线程队列深度；满时丢弃最旧帧以降低延迟
ENCODER_QUEUE_DEPTH=3
