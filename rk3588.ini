# RK3588 PCIe test config

# DMA channels: keep V7 receive on 0/0
UP_LOOP_DMA_CHANNUM=0
DOWN_LOOP_DMA_CHANNUM=0

# Legacy packet save path
YUV_SAVE_PATH=/tmp/pcie_yuv/

# Print detail logs: 1=enable, 0=disable
PRINTF_UP_MAG=1

# V7 PNG frame output (diagnostic/local only)
PNG_SAVE_PATH=/tmp/pcie_yuv/
PNG_SCALE_MODE=minmax

# SCP is no longer used; RK3588 serves live frames over HTTP JPG.
TRANSFER_ENABLE=0

# V7 live camera stream. Open http://192.168.1.100:7766 in a browser.
STREAM_ENABLE=1
STREAM_PORT=7766
STREAM_MODE=lossless
STREAM_JPEG_QUALITY=85
STREAM_REPEAT_FPS=10
STREAM_MAX_CLIENTS=4
STREAM_SEND_TIMEOUT_MS=800
STREAM_MAX_MEM_FRAMES=8
STREAM_SPOOL_PATH=/tmp/pcie_yuv/spool/
STREAM_MAX_SPOOL_GB=8
STREAM_SCALE_MODE=minmax
STREAM_PARTIAL_ENABLE=1
STREAM_MIN_IMAGE_PACKETS=28000

# Raw diagnostic capture for non-SWRITE packets such as ftype=0x5.
# These files are samples only and are not used to generate images.
RAW_CAPTURE_ENABLE=0
RAW_CAPTURE_PATH=/tmp/pcie_yuv/raw/
RAW_CAPTURE_MAX_FILES=8
RAW_CAPTURE_MAX_BYTES_PER_PACKET=512

# High-rate receive path: keep SWRITE trace disabled unless diagnosing addresses.
SWRITE_TRACE_ENABLE=0
